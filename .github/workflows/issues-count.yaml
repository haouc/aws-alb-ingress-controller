# This is a basic workflow to help you get started with Actions

name: Checking-APIs

Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
# on: 
#   schedule:
#    - cron: "*/10 * * * *"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:


# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2

      - name: Count Issues
        run: |
            echo "METRIC_VALUE=$(curl https://api.github.com/repos/kubernetes-sigs/aws-load-balancer-controller | grep "open_issues_count" | cut -d ":" -f2 | awk '{$1=$1};1' | cut -d "," -f1)" >> $GITHUB_ENV

      - name: Publish to CW
        uses: aws-actions/action-cloudwatch-metrics@main
        env:
            AWS_DEFAULT_REGION: us-west-2
            AWS_REGION: us-west-2
            AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}       
        with:
          metric-name: aws-load-balancer-controller-open-issues
          metric-value: ${{ env.METRIC_VALUE }}
